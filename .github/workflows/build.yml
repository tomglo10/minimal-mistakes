name: build

on:
  push:
    branches:
      - master # Ensure your main branch is actually named 'master' and not 'main'
  workflow_dispatch: {}
  repository_dispatch: {}

jobs:
  build:
    # REMOVED: the "if: github.repository" line so it runs on YOUR repo
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true # This simplifies the caching steps significantly

    - name: Install Dependencies
      # REMOVED: working-directory: docs/ (unless your Gemfile is actually in a docs folder)
      run: |
        bundle install --jobs=4 --retry=3

    - name: Update Algolia index
      # REMOVED: working-directory: docs/
      run: bundle exec jekyll algolia push
      env:
        ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
      continue-on-error: true
